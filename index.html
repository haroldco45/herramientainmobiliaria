<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Positivas - CRM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .kpi-card { transition: all 0.3s ease; border: 1px solid transparent; }
        .kpi-card:hover { border-color: #6366f1; transform: translateY(-3px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 gradient-brand rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-bolt text-lg"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight uppercase">Vibras <span class="text-indigo-600">Positivas</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                <input type="text" id="buscador" onkeyup="filtrarProspectos()" placeholder="Buscar cliente o propiedad..." class="hidden md:block bg-slate-100 border-none px-4 py-2 rounded-lg text-xs focus:ring-2 focus:ring-indigo-400 outline-none w-64">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-sm kpi-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Leads</p>
                <h3 id="kpi-total" class="text-2xl font-extrabold text-slate-800">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm kpi-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">En Visita</p>
                <h3 id="kpi-visitas" class="text-2xl font-extrabold text-indigo-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm kpi-card border-b-4 border-b-emerald-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Cierres Ganados</p>
                <h3 id="kpi-cierres" class="text-2xl font-extrabold text-emerald-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm kpi-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tasa de Éxito</p>
                <h3 id="kpi-tasa" class="text-2xl font-extrabold text-pink-600">0%</h3>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                    <h2 class="text-2xl font-extrabold mb-2">Capturar <span class="text-indigo-600">Energía</span></h2>
                    <p class="text-slate-500 text-sm mb-6">Nuevo registro en el embudo.</p>
                    
                    <form id="prospectoForm" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1">NOMBRE</label>
                            <input type="text" id="nombre" required class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Ej. Ana García">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1">WHATSAPP (Sin +)</label>
                            <input type="number" id="telefono" required class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="573001234567">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1">PROPIEDAD</label>
                            <input type="text" id="propiedad" required class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Apartamento o Casa">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-1">ETAPA</label>
                            <select id="estado" class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 outline-none appearance-none">
                                <option value="Contacto Inicial">📩 Contacto Inicial</option>
                                <option value="Visita Programada">🏠 Visita Programada</option>
                                <option value="Oferta Enviada">💰 Oferta Enviada</option>
                                <option value="Cierre de Negocio">✨ Cierre Ganado</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full gradient-brand text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all">
                            CREAR PROSPECTO
                        </button>
                    </form>
                </div>
            </aside>

            <section class="lg:col-span-8">
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                        <h3 class="text-lg font-bold">Gestión de Leads</h3>
                        <div class="flex space-x-2">
                            <button onclick="exportarExcel()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-emerald-100 transition">EXPORTAR</button>
                            <button onclick="limpiarTodo()" class="bg-slate-100 text-slate-400 px-3 py-2 rounded-xl text-[10px] font-black hover:text-red-500 transition">REINICIAR</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50">
                                <tr class="text-[10px] text-slate-400 uppercase tracking-widest">
                                    <th class="px-8 py-4">Cliente</th>
                                    <th class="px-8 py-4">Interés</th>
                                    <th class="px-8 py-4 text-center">Estado</th>
                                    <th class="px-8 py-4"></th>
                                </tr>
                            </thead>
                            <tbody id="listaProspectos" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="vacio" class="hidden py-16 text-center text-slate-300"><i class="fas fa-seedling text-4xl mb-2"></i><p>Sin prospectos hoy.</p></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const form = document.getElementById('prospectoForm');
        const lista = document.getElementById('listaProspectos');
        const emptyState = document.getElementById('vacio');

        document.addEventListener('DOMContentLoaded', cargarDatos);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const nuevo = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                propiedad: document.getElementById('propiedad').value,
                estado: document.getElementById('estado').value,
                fecha: new Date().toLocaleDateString('es-CO')
            };
            let data = JSON.parse(localStorage.getItem('vp_leads')) || [];
            data.push(nuevo);
            localStorage.setItem('vp_leads', JSON.stringify(data));
            form.reset();
            cargarDatos();
        });

        function cargarDatos() {
            let data = JSON.parse(localStorage.getItem('vp_leads')) || [];
            lista.innerHTML = '';
            actualizarKPIs(data);
            
            if(data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            data.reverse().forEach(p => {
                const badge = p.estado === 'Cierre de Negocio' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-50 text-indigo-600';
                // Link de WhatsApp dinámico
                const wsLink = `https://wa.me/${p.telefono}?text=Hola%20${encodeURIComponent(p.nombre)},%20te%20saludo%20de%20Vibras%20Positivas.%20¿Cómo%20vas%20con%20el%20interés%20en%20${encodeURIComponent(p.propiedad)}?`;
                
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50/80 transition-all group">
                        <td class="px-8 py-5">
                            <div class="font-bold text-slate-800">${p.nombre}</div>
                            <div class="text-[10px] text-slate-400">${p.fecha}</div>
                        </td>
                        <td class="px-8 py-5 text-slate-500 italic">
                            <i class="fas fa-tag mr-2 text-indigo-300"></i>${p.propiedad}
                        </td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${badge}">${p.estado}</span>
                        </td>
                        <td class="px-8 py-5 text-right space-x-3">
                            <a href="${wsLink}" target="_blank" class="text-emerald-500 hover:text-emerald-600 text-lg transition-transform hover:scale-125 inline-block">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                            <button onclick="borrar(${p.id})" class="text-slate-200 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function actualizarKPIs(data) {
            const total = data.length;
            const visitas = data.filter(p => p.estado === 'Visita Programada').length;
            const cierres = data.filter(p => p.estado === 'Cierre de Negocio').length;
            const tasa = total > 0 ? ((cierres / total) * 100).toFixed(0) : 0;

            document.getElementById('kpi-total').innerText = total;
            document.getElementById('kpi-visitas').innerText = visitas;
            document.getElementById('kpi-cierres').innerText = cierres;
            document.getElementById('kpi-tasa').innerText = tasa + '%';
        }

        function filtrarProspectos() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const filas = lista.getElementsByTagName('tr');
            for (let i = 0; i < filas.length; i++) {
                const texto = filas[i].textContent.toLowerCase();
                filas[i].style.display = texto.includes(busqueda) ? '' : 'none';
            }
        }

        function borrar(id) {
            let data = JSON.parse(localStorage.getItem('vp_leads')) || [];
            data = data.filter(p => p.id !== id);
            localStorage.setItem('vp_leads', JSON.stringify(data));
            cargarDatos();
        }

        function limpiarTodo() {
            if(confirm('¿Reiniciar toda la agenda?')) {
                localStorage.removeItem('vp_leads');
                cargarDatos();
            }
        }

        function exportarExcel() {
            let data = JSON.parse(localStorage.getItem('vp_leads')) || [];
            if(data.length === 0) return alert("Nada que exportar.");
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Leads_VP");
            XLSX.writeFile(wb, `Vibras_Positivas_CRM.xlsx`);
        }
    </script>
</body>
</html>
